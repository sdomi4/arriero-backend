name: "Dome Test Time"
sequence:
  - name: "Dome Open / Close Test"
    action: debug_print
    args: { message: "Single Invocation Dome Test Start" }
    
  - name: "Opening Dome Block with wait"
    parallel:
      - name: "Open Dome"
        action: open_dome
        args: { device_id: "sim_dome" }
        
      - name: "Nested Sleep + Debug"
        sequence:
           - name: "Sleep Start"
             action: debug_print
             args: { message: "Sleeping for 10 seconds while dome opens..." }
           - name: "Sleep Wait 10"
             action: debug_sleep
             args: { seconds: 10}
           - name: "Sleep End"
             action: debug_print
             args: { message: "10 seconds elapsed." }

  - name: "Close Dome"
    action: close_dome
    args: { device_id: "sim_dome" }
  
  - name: "Dome Test Complete"
    action: debug_print
    args: { message: "Dome test sequence complete." }